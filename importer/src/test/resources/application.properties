importer.csv.members-path=src/test/resources/members.csv
importer.csv.dogs-path=src/test/resources/dogs.csv
importer.scheduler.enabled=false

# Build-Zeit: PostgreSQL für Testcontainers-Integrationstests
%test.quarkus.datasource.db-kind=postgresql

# JaCoCo (Quarkus @QuarkusTest)
quarkus.jacoco.enabled=true
quarkus.jacoco.report=true
quarkus.jacoco.data-file=build/jacoco-quarkus.exec
quarkus.jacoco.reuse-data-file=true

# Datasource + externe Services werden von ImporterTestResource gesetzt
# (PostgreSQL + WireMock via Testcontainers)
