version: "3.9"

services:
  redmine:
    container_name: redmine
    restart: unless-stopped
    build: .
#    ports:
#      - "${REDMINE_PORT:-8080}:3000"
    networks:
      - coolify

    environment:
      REDMINE_DB_MYSQL: ${REDMINE_DB_HOST}
      REDMINE_DB_PORT: ${REDMINE_DB_PORT}
      REDMINE_DB_DATABASE: ${REDMINE_DB_NAME}
      REDMINE_DB_USERNAME: ${REDMINE_DB_USER}
      REDMINE_DB_PASSWORD: ${REDMINE_DB_PASSWORD}

      REDMINE_SECRET_KEY_BASE: ${REDMINE_SECRET_KEY_BASE}

      REDMINE_SMTP_ENABLED: ${REDMINE_SMTP_ENABLED}
      REDMINE_SMTP_ADDRESS: ${REDMINE_SMTP_ADDRESS}
      REDMINE_SMTP_PORT: ${REDMINE_SMTP_PORT}
      REDMINE_SMTP_DOMAIN: ${REDMINE_SMTP_DOMAIN}
      REDMINE_SMTP_USER_NAME: ${REDMINE_SMTP_USER}
      REDMINE_SMTP_PASSWORD: ${REDMINE_SMTP_PASSWORD}
      REDMINE_SMTP_AUTH: ${REDMINE_SMTP_AUTH}
      REDMINE_SMTP_ENABLE_STARTTLS_AUTO: ${REDMINE_SMTP_STARTTLS}

    volumes:
      - redmine_files:/usr/src/redmine/files
#      - redmine_plugins:/usr/src/redmine/plugins
      - redmine_themes:/usr/src/redmine/public/themes

networks:
  coolify:
    external: true

volumes:
  redmine_files:
  redmine_plugins:
  redmine_themes: