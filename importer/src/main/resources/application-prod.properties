# Produktionsprofil: ./gradlew quarkusRun -Dquarkus.profile=prod
# oder: QUARKUS_PROFILE=prod ./gradlew quarkusRun

# Scheduler: täglicher Import um 02:00 Uhr
importer.scheduler.enabled=true
importer.scheduler.cron=${IMPORTER_SCHEDULER_CRON:0 0 2 * * ?}

# Persistente Job-Datenbank
quarkus.datasource.db-kind=${QUARKUS_DATASOURCE_DB_KIND:postgresql}
quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME:importer}
quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD:importer}
quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL:jdbc:postgresql://localhost:5432/importer}
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
quarkus.hibernate-orm.log.sql=false

# Flyway (Baseline für bestehende Hibernate-Schemas ohne flyway_schema_history)
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.baseline-version=1
quarkus.flyway.baseline-description=Initial import_jobs schema
