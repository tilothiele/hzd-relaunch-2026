quarkus.application.name=hzd-importer
quarkus.http.port=${QUARKUS_HTTP_PORT:8081}

# Database (H2 für lokale Entwicklung)
quarkus.datasource.db-kind=h2
quarkus.datasource.username=importer
quarkus.datasource.password=importer
quarkus.datasource.jdbc.url=jdbc:h2:mem:importer;DB_CLOSE_DELAY=-1
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
quarkus.hibernate-orm.log.sql=false

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.baseline-version=1
quarkus.flyway.baseline-description=Initial import_jobs schema

# CSV input
importer.csv.members-path=${IMPORTER_CSV_MEMBERS_PATH:members.csv}
importer.csv.dogs-path=${IMPORTER_CSV_DOGS_PATH:dogs.csv}

# Scheduler (dev: aus, prod: siehe application-prod.properties)
importer.scheduler.enabled=${IMPORTER_SCHEDULER_ENABLED:false}
importer.scheduler.cron=${IMPORTER_SCHEDULER_CRON:0 0 2 * * ?}

# Strapi REST API
importer.strapi.base-url=${IMPORTER_STRAPI_BASE_URL:http://localhost:1337/api}
importer.strapi.api-token=${IMPORTER_STRAPI_API_TOKEN:}
importer.strapi.http-timeout=${IMPORTER_STRAPI_HTTP_TIMEOUT:30s}
importer.strapi.page-size=${IMPORTER_STRAPI_PAGE_SIZE:100}
importer.strapi.max-retries=${IMPORTER_STRAPI_MAX_RETRIES:3}
importer.strapi.request-delay=${IMPORTER_STRAPI_REQUEST_DELAY:100ms}

# Authentik
importer.authentik.base-url=${IMPORTER_AUTHENTIK_BASE_URL:https://auth.hovawarte.com}
importer.authentik.api-token=${IMPORTER_AUTHENTIK_API_TOKEN:}
importer.authentik.username=${IMPORTER_AUTHENTIK_USERNAME:}
importer.authentik.password=${IMPORTER_AUTHENTIK_PASSWORD:}
importer.authentik.auth-flow=${IMPORTER_AUTHENTIK_AUTH_FLOW:}
importer.authentik.http-timeout=${IMPORTER_AUTHENTIK_HTTP_TIMEOUT:30s}
importer.authentik.page-size=${IMPORTER_AUTHENTIK_PAGE_SIZE:100}
importer.authentik.default-groups=${IMPORTER_AUTHENTIK_DEFAULT_GROUPS:website-users}

# Retry
importer.retry.initial-delay=${IMPORTER_RETRY_INITIAL_DELAY:1s}
importer.retry.max-delay=${IMPORTER_RETRY_MAX_DELAY:30s}

# REST client
quarkus.rest-client.strapi-api.url=${IMPORTER_STRAPI_BASE_URL:http://localhost:1337/api}
quarkus.rest-client.authentik-api.url=${IMPORTER_AUTHENTIK_BASE_URL:https://auth.hovawarte.com}

# Dev-Profil: Scheduler explizit deaktiviert
%dev.importer.scheduler.enabled=false
